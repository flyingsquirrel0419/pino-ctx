name: Validate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Typecheck
        id: typecheck
        run: npm run typecheck

      - name: Run tests
        id: tests
        run: npm test

      - name: Build package
        id: build
        run: npm run build

      - name: Verify npm package contents
        id: pack
        run: npm pack --dry-run

      - name: Validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Validation summary"
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- ref: \`${{ github.ref_name }}\`"
            echo "- package: \`$(node -p "require('./package.json').name")\`"
            echo "- install: \`${{ steps.install.outcome || 'skipped' }}\`"
            echo "- typecheck: \`${{ steps.typecheck.outcome || 'skipped' }}\`"
            echo "- tests: \`${{ steps.tests.outcome || 'skipped' }}\`"
            echo "- build: \`${{ steps.build.outcome || 'skipped' }}\`"
            echo "- pack: \`${{ steps.pack.outcome || 'skipped' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
